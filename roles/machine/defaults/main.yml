---
# Composable Tailscale feature flags — set per-host or per-group to control
# what gets passed to `tailscale up`. The role constructs the full CLI invocation
# from these vars so you never need to write raw argument strings in inventory.

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
# Auth flow (two steps, both via HTTPS — no secrets exposed in process list):
#   1. client_id + client_secret → short-lived access token (oauth/token endpoint)
#   2. access token → one-time auth key (keys API, expires in 5 min, single-use)
#   3. one-time auth key → tailscale up (brief process exposure; low risk)
#
# One-time setup:
#   1. Tailscale admin → Settings → Trust Credentials → Create OAuth client
#   2. Scope: Auth Keys → Write
#   3. Assign tags (must exist in ACL tagOwners)
#   4. Note both the Client ID and Client Secret
#   5. Vault-encrypt the secret: ansible-vault encrypt_string 'tskey-client-...'
#      Store the client ID in plain text (it is not sensitive).

# OAuth client ID — not sensitive, store in plain text.
tailscale_oauth_client_id: ""

# OAuth client secret (tskey-client-...) — vault-encrypt this value.
tailscale_authkey: ""

# Ephemeral nodes are removed from the tailnet when offline. Keep false for
# persistent servers — ephemeral nodes lose credentials when removed and
# cannot reconnect after reboot without a fresh ansible run.
# true = container / CI runner  |  false = long-lived server (default)
tailscale_oauth_ephemeral: false

# Skip manual device approval in the admin console. Keep true for automation.
tailscale_oauth_preauthorized: true

# Seconds to wait for `tailscale up` to complete.
tailscale_up_timeout: "120"

# Set true to log the auth key in plain text (useful for debugging auth failures).
# Keep false in production.
tailscale_insecurely_log_authkey: false

# ---------------------------------------------------------------------------
# Package
# ---------------------------------------------------------------------------
# 'present' — install if missing, never upgrade on a routine ansible run.
# 'latest'  — always upgrade (use a dedicated update playbook instead).
# 'absent'  — remove tailscale.
tailscale_package_state: present

# ---------------------------------------------------------------------------
# Tags
# ---------------------------------------------------------------------------
# tailscale_oauth_tag is always applied to every node managed by this role.
# It is the only tag that needs to be assigned to the OAuth client in Trust
# Credentials, regardless of what other tags nodes carry. It must exist in
# your ACL tagOwners.
tailscale_oauth_tag: "ansible-managed"

# Additional tags applied to this node. The "tag:" prefix is added
# automatically. Use these for role/environment grouping (e.g. "servers",
# "prod"). All tags must exist in your ACL tagOwners.
tailscale_tags:
  - "servers"

# ---------------------------------------------------------------------------
# IP forwarding
# ---------------------------------------------------------------------------
# IPv4 forwarding is always enabled — required for exit node, subnet router,
# and connector features, and avoids a chicken-and-egg problem if a host is
# promoted to one of those roles later.
tailscale_ipv4_forwarding: true

# IPv6 forwarding can be disabled per-host if it causes issues (e.g. hosts
# without IPv6 interfaces or with conflicting kernel settings).
tailscale_ipv6_forwarding: true

# ---------------------------------------------------------------------------
# Feature flags — map 1:1 to `tailscale up` arguments
# ---------------------------------------------------------------------------
tailscale_ssh: false
tailscale_accept_dns: true
tailscale_advertise_exit_node: false
tailscale_accept_routes: false
tailscale_snat_subnet_routes: true
tailscale_stateful_filtering: false

# Set to a comma-separated CIDR string to advertise subnet routes, e.g.:
#   tailscale_advertise_routes: "10.0.1.0/24,10.0.2.0/24"
# false or empty = passes --advertise-routes= (empty) to explicitly clear any
# previously advertised routes on the node.
tailscale_advertise_routes: false

# Port for a self-hosted DERP relay server running on this node.
# false or empty = flag omitted (most nodes). Set to an integer port number
# only on dedicated relay hosts (e.g. tailscale_relay_server_port: 42001).
tailscale_relay_server_port: false

# ---------------------------------------------------------------------------
# Connector / subnet connector
# ---------------------------------------------------------------------------
# Advertises this node as an app connector. When true, tailscale_connector_tag
# is automatically appended to tailscale_tags.
tailscale_connector: false
tailscale_connector_tag: "connector"

# ---------------------------------------------------------------------------
# Auto-update
# ---------------------------------------------------------------------------
# Disabled by default — a tailscale daemon restart in prod can cause brief
# connectivity loss. Use a dedicated update playbook instead.
tailscale_auto_update: false

# ---------------------------------------------------------------------------
# Key expiry
# ---------------------------------------------------------------------------
# Tailscale devices have a key expiry (default 180 days) after which they are
# removed from the tailnet. For ansible-managed servers this is undesirable —
# the role can re-authenticate the node but only when it can reach the host.
# Set true to disable key expiry on every managed node via the admin API.
tailscale_key_expiry_disabled: true
