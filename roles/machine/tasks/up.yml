---
# Runs `tailscale up` only when configuration has changed or the node is not
# connected. Idempotency is achieved by hashing tailscale_args + tags and
# comparing against a stored state file. The auth key is intentionally excluded
# from the hash so rotating the OAuth secret does not trigger a re-up.
#
# Auth flow (two HTTPS steps — OAuth secret never appears in the process list):
#   1. POST /api/v2/oauth/token  — exchange client_id + client_secret for a
#      short-lived access token.
#   2. POST /api/v2/tailnet/-/keys — use the access token to generate a
#      one-time auth key (expires 300s, single-use).
#   3. tailscale up --authkey — the one-time key appears briefly in the
#      process list but is worthless once used or expired.

- name: Compute configuration hash
  ansible.builtin.set_fact:
    _tailscale_config_hash: >-
      {{ ((tailscale_args | trim) ~ '|' ~ (_tailscale_effective_tags | sort | join(',')))
         | hash('sha256') }}

- name: Read stored configuration hash
  ansible.builtin.slurp:
    src: /var/lib/tailscale-ansible.state
  register: _tailscale_state
  failed_when: false

- name: Check Tailscale connection status
  ansible.builtin.command: tailscale status --peers=false
  register: _tailscale_status
  changed_when: false
  failed_when: false

- name: Determine if Tailscale up is needed
  ansible.builtin.set_fact:
    _tailscale_needs_up: >-
      {{ _tailscale_state.failed or
         (_tailscale_state.content | default('') | b64decode | trim) != _tailscale_config_hash or
         _tailscale_status.rc != 0 }}

- name: Ensure tailscale_oauth_client_id is set
  ansible.builtin.fail:
    msg: "tailscale_oauth_client_id is not set. Add the OAuth client ID to your group_vars."
  when: tailscale_oauth_client_id | length == 0

- name: Ensure tailscale_authkey is set
  ansible.builtin.fail:
    msg: "tailscale_authkey is not set. Vault-encrypt the OAuth client secret and assign it to tailscale_authkey."
  when: tailscale_authkey | length == 0

- name: Authenticate and bring up Tailscale
  when: _tailscale_needs_up | bool
  block:
    - name: Exchange OAuth credentials for access token
      ansible.builtin.uri:
        url: "https://api.tailscale.com/api/v2/oauth/token"
        method: POST
        body_format: form-urlencoded
        body:
          client_id: "{{ tailscale_oauth_client_id }}"
          client_secret: "{{ tailscale_authkey }}"
        status_code: 200
      register: _tailscale_token_response
      no_log: "{{ not tailscale_insecurely_log_authkey }}"

    - name: Create one-time auth key via Tailscale API
      ansible.builtin.uri:
        url: "https://api.tailscale.com/api/v2/tailnet/-/keys"
        method: POST
        headers:
          Authorization: "Bearer {{ _tailscale_token_response.json.access_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          capabilities:
            devices:
              create:
                reusable: false
                ephemeral: "{{ tailscale_oauth_ephemeral | bool }}"
                preauthorized: "{{ tailscale_oauth_preauthorized | bool }}"
                tags: "{{ _tailscale_effective_tags | map('regex_replace', '^', 'tag:') | list }}"
          expirySeconds: 300
        status_code: 200
      register: _tailscale_auth_response
      no_log: "{{ not tailscale_insecurely_log_authkey }}"

    - name: Bring up Tailscale
      ansible.builtin.shell: >-
        systemd-run --no-block --
        tailscale up
        --authkey={{ _tailscale_auth_response.json.key }}
        --advertise-tags={{ _tailscale_effective_tags | map('regex_replace', '^', 'tag:') | join(',') }}
        {{ tailscale_args | trim }}
        --timeout={{ tailscale_up_timeout }}s
      no_log: "{{ not tailscale_insecurely_log_authkey }}"
      changed_when: true

    - name: Wait for Tailscale to reconnect
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: "{{ tailscale_up_timeout | int + 30 }}"

    - name: Verify Tailscale is running
      ansible.builtin.command: tailscale status --peers=false
      register: _tailscale_verify
      changed_when: false
      failed_when: _tailscale_verify.rc != 0 or 'Running' not in _tailscale_verify.stdout

- name: Write configuration hash to state file
  ansible.builtin.copy:
    content: "{{ _tailscale_config_hash }}"
    dest: /var/lib/tailscale-ansible.state
    owner: root
    group: root
    mode: "0600"
  when: _tailscale_needs_up | bool
