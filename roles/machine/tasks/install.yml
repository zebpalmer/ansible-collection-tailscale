---
# Adds the official Tailscale apt repository and installs the package.
# Supports Ubuntu and Debian. tailscale_package_state controls whether to
# install, pin, or remove.

- name: Install apt prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: tailscale_package_state != 'absent'

- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: tailscale_package_state != 'absent'

- name: Check if dearmored Tailscale GPG keyring exists
  ansible.builtin.stat:
    path: /etc/apt/keyrings/tailscale-archive-keyring.gpg
  register: _tailscale_keyring_stat
  when: tailscale_package_state != 'absent'

- name: Download Tailscale GPG key (ASCII-armored)
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release }}.gpg"
    dest: /tmp/tailscale-keyring.gpg.asc
    mode: "0644"
  when:
    - tailscale_package_state != 'absent'
    - not _tailscale_keyring_stat.stat.exists

- name: Dearmor Tailscale GPG key for apt signed-by
  ansible.builtin.command:
    cmd: >-
      gpg --batch --no-tty --yes --dearmor -o /etc/apt/keyrings/tailscale-archive-keyring.gpg
      /tmp/tailscale-keyring.gpg.asc
    creates: /etc/apt/keyrings/tailscale-archive-keyring.gpg
  when: tailscale_package_state != 'absent'

- name: Remove legacy Tailscale GPG keyring from /usr/share/keyrings
  ansible.builtin.file:
    path: /usr/share/keyrings/tailscale-archive-keyring.gpg
    state: absent
  when: tailscale_package_state != 'absent'

- name: Find legacy Tailscale apt source files referencing /usr/share/keyrings
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: "*tailscale*"
    contains: "/usr/share/keyrings/tailscale"
  register: _tailscale_legacy_sources
  when: tailscale_package_state != 'absent'

- name: Remove legacy Tailscale apt source files referencing /usr/share/keyrings
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _tailscale_legacy_sources.files | default([]) }}"
  when: tailscale_package_state != 'absent'

- name: Add Tailscale apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/tailscale-archive-keyring.gpg]
      https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} main
    state: present
    filename: tailscale
  when: tailscale_package_state != 'absent'

- name: Install Tailscale package
  ansible.builtin.apt:
    name: tailscale
    state: "{{ tailscale_package_state }}"
    update_cache: true
    cache_valid_time: 3600

- name: Stop and disable Tailscale service on uninstall
  ansible.builtin.systemd:
    name: tailscaled
    state: stopped
    enabled: false
  when: tailscale_package_state == 'absent'
  failed_when: false  # service may already be stopped/missing

- name: Remove Tailscale apt repository on uninstall
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/tailscale-archive-keyring.gpg]
      https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} main
    state: absent
    filename: tailscale
  when: tailscale_package_state == 'absent'

- name: Remove Tailscale GPG key on uninstall
  ansible.builtin.file:
    path: /etc/apt/keyrings/tailscale-archive-keyring.gpg
    state: absent
  when: tailscale_package_state == 'absent'

- name: Remove role-managed state files on uninstall
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/tailscale-ansible.state
    - "{{ tailscale_args_file }}"
  when: tailscale_package_state == 'absent'
