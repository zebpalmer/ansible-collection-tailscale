---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core and ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.18" ansible-lint

      - name: Install collection dependencies
        run: ansible-galaxy collection install ansible.posix

      - name: Run ansible-lint
        run: ansible-lint

  syntax-check:
    name: playbook syntax-check
    runs-on: ubuntu-latest
    steps:
      - name: Check out into collection path
        uses: actions/checkout@v4
        with:
          path: ansible_collections/zebpalmer/tailscale

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.18"

      - name: Install collection dependencies into workspace path
        run: ansible-galaxy collection install ansible.posix -p ${{ github.workspace }}

      - name: Write smoke-test playbook
        run: |
          cat > /tmp/smoke.yml <<'EOF'
          ---
          - hosts: localhost
            gather_facts: false
            roles:
              - role: zebpalmer.tailscale.machine
          EOF

      - name: Syntax check
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}
        run: ansible-playbook --syntax-check /tmp/smoke.yml

  build:
    name: galaxy collection build
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.18"

      - name: Build collection tarball
        run: ansible-galaxy collection build --output-path dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: collection-tarball
          path: dist/*.tar.gz
